spring:
  application:
    name: mastermeister

  # 内部 DB(H2 ファイルモード)。データは作業ディレクトリ配下 data/ に保存
  datasource:
    url: jdbc:h2:file:./data/mastermeister
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: none # スキーマ管理は Flyway に一本化
    open-in-view: false

  # SMTP(開発既定: devenv の MailPit。本番は環境変数等で上書きする)
  mail:
    host: localhost
    port: 1025

  # メール件名等のメッセージ解決で OS ロケールに引きずられないようにする
  messages:
    fallback-to-system-locale: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health

# アプリケーション設定(mm.app.*)
# jwt.secret と credential.* は既定値なし(未設定は起動失敗)。
#   - MM_APP_JWT_SECRET: 32 バイト以上の文字列
#   - MM_APP_CREDENTIAL_KEYS_<keyId>: Base64 の 32 バイト鍵(例 MM_APP_CREDENTIAL_KEYS_K1)
#   - MM_APP_CREDENTIAL_ACTIVEKEYID: 暗号化に使う鍵 ID(例 k1)
# 開発手順は README 参照
mm:
  app:
    jwt:
      access-token-expiry: 10m
      refresh-token-expiry: 24h
    user-registration:
      token-expiry: 3h
    auth:
      lockout:
        threshold: 5
        duration: 15m
    security-alert:
      window: 10m
      threshold: 10
    # admin.bootstrap.email / .password: 初期管理者(未設定なら何もしない)
    mail:
      from: noreply@mastermeister.local
      base-url: http://localhost:8080
    permission:
      cache-ttl: 10m
      cache-max-size: 1000
