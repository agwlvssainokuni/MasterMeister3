spring:
  application:
    name: mastermeister

  # 内部 DB(H2 ファイルモード)。データは作業ディレクトリ配下 data/ に保存
  datasource:
    url: jdbc:h2:file:./data/mastermeister
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: none # スキーマ管理は Flyway に一本化
    open-in-view: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health

# アプリケーション設定(mm.app.*)
# 実項目(mm.app.admin.bootstrap.* / mm.app.jwt.* 等)はユニット③以降で追加する
