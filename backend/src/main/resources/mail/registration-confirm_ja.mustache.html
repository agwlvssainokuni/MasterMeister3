<!doctype html>
<html lang="ja">
<body style="margin: 0; padding: 24px; background-color: #f5f6f8; font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif; color: #1f2430;">
<div style="max-width: 560px; margin: 0 auto; background-color: #ffffff; border: 1px solid #d9dce3; border-radius: 8px; padding: 32px;">
  <h1 style="margin: 0 0 16px; font-size: 18px; color: #1f2430;">MasterMeister ユーザ登録のご案内</h1>
  <p style="margin: 0 0 16px; font-size: 14px; line-height: 1.8;">
    ユーザ登録の申請を受け付けました。<br>
    以下のリンクからパスワードを設定して、登録を完了してください。
  </p>
  <p style="margin: 0 0 24px;">
    <a href="{{{completeUrl}}}" style="display: inline-block; padding: 10px 24px; background-color: #2f6fed; color: #ffffff; text-decoration: none; border-radius: 6px; font-size: 14px;">パスワードを設定する</a>
  </p>
  <p style="margin: 0 0 8px; font-size: 12px; color: #5a6172; line-height: 1.8;">
    ボタンが開けない場合は、次の URL をブラウザに貼り付けてください。<br>
    <a href="{{{completeUrl}}}" style="color: #2f6fed; word-break: break-all;">{{completeUrl}}</a>
  </p>
  <p style="margin: 0 0 8px; font-size: 12px; color: #5a6172;">このリンクの有効期限は {{expiryHours}} 時間です。</p>
  <p style="margin: 0; font-size: 12px; color: #5a6172;">このメールに心当たりがない場合は、破棄してください(登録は行われません)。</p>
</div>
</body>
</html>
