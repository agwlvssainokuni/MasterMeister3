<!doctype html>
<html lang="ja">
<body style="margin: 0; padding: 24px; background-color: #f5f6f8; font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif; color: #1f2430;">
<div style="max-width: 560px; margin: 0 auto; background-color: #ffffff; border: 1px solid #d9dce3; border-radius: 8px; padding: 32px;">
  <h1 style="margin: 0 0 16px; font-size: 18px; color: #1f2430;">アカウントが承認されました</h1>
  <p style="margin: 0 0 16px; font-size: 14px; line-height: 1.8;">
    {{displayName}} さん<br>
    MasterMeister のアカウントが管理者に承認され、利用可能になりました。
  </p>
  <p style="margin: 0 0 24px;">
    <a href="{{{loginUrl}}}" style="display: inline-block; padding: 10px 24px; background-color: #2f6fed; color: #ffffff; text-decoration: none; border-radius: 6px; font-size: 14px;">ログインする</a>
  </p>
  <p style="margin: 0; font-size: 12px; color: #5a6172;">アクセスできるデータは管理者が設定した権限の範囲に限られます。</p>
</div>
</body>
</html>
