# テストプロファイル: インメモリ H2(ファイルを汚さない)+ mm.app.* 全項目設定

spring:
  datasource:
    url: jdbc:h2:mem:mastermeister-test;DB_CLOSE_DELAY=-1
  mail:
    host: localhost
    port: 1025

# JavaMailSender をモックに差し替えるテストで mail ヘルスチェックが破綻しないようにする
management:
  health:
    mail:
      enabled: false

mm:
  app:
    jwt:
      secret: test-secret-0123456789abcdef0123456789abcdef
    credential:
      # AES-256 テスト鍵(Base64 32 バイト)。k1 = 'A' x 32, k2 = 'B' x 32
      keys:
        k1: QUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUE=
        k2: QkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkI=
      active-key-id: k1
      access-token-expiry: 10m
      refresh-token-expiry: 24h
    user-registration:
      token-expiry: 3h
    auth:
      lockout:
        threshold: 5
        duration: 15m
    security-alert:
      window: 10m
      threshold: 10
    mail:
      from: noreply@mastermeister.local
      base-url: http://localhost:8080
