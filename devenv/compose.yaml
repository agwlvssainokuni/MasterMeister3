# MasterMeister 開発環境(対象 RDBMS 3 種 + メール確認)
# 起動: docker compose up -d / 停止: docker compose down / 初期化: docker compose down -v
name: mastermeister-devenv

services:
  mysql:
    image: mysql:8.4
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_USER: mmdev
      MYSQL_PASSWORD: mmdev
      MYSQL_DATABASE: mmdev
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init/mysql:/docker-entrypoint-initdb.d:ro

  mariadb:
    image: mariadb:11.8
    ports:
      - "3307:3306"
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_USER: mmdev
      MARIADB_PASSWORD: mmdev
      MARIADB_DATABASE: mmdev
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./init/mariadb:/docker-entrypoint-initdb.d:ro

  postgres:
    image: postgres:18
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: mmdev
      POSTGRES_PASSWORD: mmdev
      POSTGRES_DB: mmdev
    volumes:
      # PostgreSQL 18 のイメージはデータ配置が /var/lib/postgresql 直下(サブディレクトリ自動作成)に変更された
      - postgres-data:/var/lib/postgresql
      - ./init/postgres:/docker-entrypoint-initdb.d:ro

  mailpit:
    image: axllent/mailpit:v1.30
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI

volumes:
  mysql-data:
  mariadb-data:
  postgres-data:
