[versions]
springBoot = "4.1.0"
spotless = "8.8.0"
nodeGradle = "7.1.0"
jqwik = "1.10.1"
# gradle-node-plugin がダウンロードする Node.js のバージョン
node = "24.18.0"

[libraries]
jqwik = { module = "net.jqwik:jqwik", version.ref = "jqwik" }

[plugins]
spring-boot = { id = "org.springframework.boot", version.ref = "springBoot" }
spotless = { id = "com.diffplug.spotless", version.ref = "spotless" }
node-gradle = { id = "com.github.node-gradle.node", version.ref = "nodeGradle" }
